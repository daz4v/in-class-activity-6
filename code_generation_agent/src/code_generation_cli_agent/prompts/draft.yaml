metadata:
  description: Draft GitHub Issue or PR content
  version: "1.0"

variants:
  issue:
    template: |
      Draft a GitHub Issue based on the following information:
      
      SUMMARY:
      {summary}
      
      ISSUES FOUND:
      {issues}
      
      SUGGESTED IMPROVEMENTS:
      {improvements}
      
      RISK LEVEL:
      {risk_level}
      
      Create a concise and well-structured GitHub Issue with:
      1. A clear, descriptive title (one line)
      2. Problem description
      3. Evidence from code analysis
      4. Acceptance criteria or next steps
      5. Labels (if applicable)
      
      IMPORTANT: Use plain text only. Do NOT use emojis or special Unicode characters.
      
      Format:
      [Title Line]
      
      [Body with sections]
      
  pr:
    template: |
      Draft a GitHub Pull Request description based on the following:
      
      SUMMARY:
      {summary}
      
      CHANGE TYPE:
      {change_type}
      
      ISSUES ADDRESSED:
      {issues}
      
      IMPROVEMENTS:
      {improvements}
      
      Create a clear, professional PR description with:
      1. A concise title (one line)
      2. Summary of changes
      3. Files affected
      4. Behavior changes (if any)
      5. Test plan or validation steps
      6. Risk assessment
      
      IMPORTANT: Use plain text only. Do NOT use emojis or special Unicode characters.
      
      Format:
      [Title Line]
      
      [Body with sections]
